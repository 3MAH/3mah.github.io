<!-- Brand colours for section headings (simcoon / fedoo / microgen).
     Each heading gets a translucent brand-coloured band behind it that
     fades out at both ends, so the title sits inside its brand colour
     without dominating the page. -->
<style>
  h1.brand-simcoon, h2.brand-simcoon, h3.brand-simcoon,
  h1.brand-fedoo,   h2.brand-fedoo,   h3.brand-fedoo,
  h1.brand-microgen,h2.brand-microgen,h3.brand-microgen {
    padding: 0.45em 0.7em;
    margin-top: 2em;
    border-radius: 6px;
    display: block;
  }
  h1.brand-simcoon, h2.brand-simcoon, h3.brand-simcoon {
    color: #971C20;
    background: linear-gradient(90deg,
      rgba(151, 28, 32, 0)    0%,
      rgba(151, 28, 32, 0.22) 18%,
      rgba(151, 28, 32, 0.22) 82%,
      rgba(151, 28, 32, 0)  100%);
  }
  h1.brand-fedoo, h2.brand-fedoo, h3.brand-fedoo {
    color: #1f7a1a;
    background: linear-gradient(90deg,
      rgba(47, 161, 44, 0)    0%,
      rgba(47, 161, 44, 0.22) 18%,
      rgba(47, 161, 44, 0.22) 82%,
      rgba(47, 161, 44, 0)  100%);
  }
  h1.brand-microgen, h2.brand-microgen, h3.brand-microgen {
    color: #c45f1a;
    background: linear-gradient(90deg,
      rgba(238, 125, 48, 0)   0%,
      rgba(238, 125, 48, 0.22) 18%,
      rgba(238, 125, 48, 0.22) 82%,
      rgba(238, 125, 48, 0)   100%);
  }

  /* Full-width showcase block — brand-coloured left rule, gradient
     translucent background, image bleeds to the container edges. The
     `--simcoon`, `--fedoo`, `--microgen` modifiers swap the brand colour. */
  .showcase {
    --brand:        #2fa12c;
    --brand-dark:   #1f7a1a;
    --brand-r:      47;
    --brand-g:      161;
    --brand-b:      44;
    margin: 2.5em 0 3em;
    padding: 1em 1.4em 1.4em;
    border-left: 6px solid var(--brand);
    background: linear-gradient(90deg,
      rgba(var(--brand-r), var(--brand-g), var(--brand-b), 0.10) 0%,
      rgba(var(--brand-r), var(--brand-g), var(--brand-b), 0.04) 35%,
      rgba(var(--brand-r), var(--brand-g), var(--brand-b), 0)   100%);
    border-radius: 0 8px 8px 0;
  }
  .showcase--fedoo    { --brand: #2fa12c; --brand-dark: #1f7a1a;
                        --brand-r: 47;  --brand-g: 161; --brand-b: 44;  }
  .showcase--simcoon  { --brand: #971C20; --brand-dark: #6e1316;
                        --brand-r: 151; --brand-g: 28;  --brand-b: 32;  }
  .showcase--microgen { --brand: #ee7d30; --brand-dark: #c45f1a;
                        --brand-r: 238; --brand-g: 125; --brand-b: 48;  }
  .showcase__title {
    margin: 0 0 0.35em;
    color: var(--brand-dark);
    font-weight: 700;
    font-size: 1.4em;
  }
  .showcase__lede {
    margin: 0 0 0.9em;
    color: #2a2f3a;
    font-size: 1.05em;
    line-height: 1.5;
  }
  .showcase__img {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 4px;
  }
  .showcase__grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1em;
    align-items: start;
  }
  .showcase__grid--cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .showcase__grid--cols-2x2 {
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: 1fr;
  }
  .showcase__cell { margin: 0; }
  .showcase__video {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 4px;
  }
  .showcase__subcaption {
    margin: 0.4em 0 0;
    font-size: 0.92em;
    color: #2a2f3a;
    text-align: center;
  }
  .showcase__subcaption strong { color: var(--brand-dark); }
  @media (max-width: 720px) {
    .showcase__grid { grid-template-columns: 1fr; }
  }
  .showcase__caption {
    margin: 0.7em 0 0;
    font-size: 0.92em;
    color: #5a5e6b;
  }
  .showcase__caption code {
    background: rgba(var(--brand-r), var(--brand-g), var(--brand-b), 0.10);
    padding: 0.05em 0.4em;
    border-radius: 3px;
  }
</style>

<!-- SEO: keywords (page-level overrides site-level) -->
{%- assign seo_keywords = page.keywords | default: site.keywords -%}
{%- if seo_keywords -%}
  {%- if seo_keywords.first -%}
    {%- assign seo_keywords = seo_keywords | join: ", " -%}
  {%- endif -%}
<meta name="keywords" content="{{ seo_keywords | escape }}">
{%- endif %}
